<!DOCTYPE html>
<html>
<head>
  <title>Portfolio Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: #e2e8f0;
      padding: 20px;
    }

    h2, h3 {
      text-align: center;
      margin-bottom: 10px;
    }

    .grid {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      min-width: 200px;
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
    }

    .big {
      font-size: 20px;
      margin-top: 5px;
      font-weight: bold;
    }

    .positive { color: #22c55e; }
    .negative { color: #ef4444; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th {
      background: #1e293b;
      padding: 8px;
      font-size: 11px;
    }

    td {
      padding: 6px;
      text-align: center;
      border-bottom: 1px solid #334155;
      font-size: 11px;
    }

    canvas {
      width: 100px !important;
      height: 40px !important;
    }

    .buy { color:#22c55e; font-weight:bold }
    .sell { color:#ef4444; font-weight:bold }
    .hold { color:#eab308 }

    .avg-box {
      padding: 4px;
      border-radius: 5px;
      font-size: 10px;
    }

    .bar {
      height: 6px;
      background: #1e293b;
      border-radius: 5px;
      margin-top: 4px;
    }

    .bar-fill {
      height: 100%;
      background: #22c55e;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>📊 Portfolio Analytics Dashboard</h2>

<!-- KPIs -->
<div class="grid" id="kpis"></div>

<!-- Allocation -->
<div class="card">
  <h3>📦 Allocation</h3>
  <div id="allocation"></div>
</div>

<!-- Gainers / Losers -->
<div class="grid">
  <div class="card">
    <h3>🚀 Gainers</h3>
    <table><tbody id="gainers"></tbody></table>
  </div>

  <div class="card">
    <h3>📉 Losers</h3>
    <table><tbody id="losers"></tbody></table>
  </div>
</div>

<!-- MAIN TABLE -->
<table>
<thead>
<tr>
  <th>Ticker</th>
  <th>Chart</th>
  <th>Buy</th>
  <th>Qty</th>
  <th>Price</th>
  <th>7D</th>
  <th>14D</th>
  <th>30D</th>
  <th>RSI</th>
  <th>Score</th>
  <th>Reco</th>
  <th>Reasons</th>
  <th>PnL%</th>
  <th>Heat</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

function safe(v, d=0){ return v ?? d }

function pct(curr, avg){
  if(!avg) return 0
  return ((curr-avg)/avg*100).toFixed(1)
}

function avgBox(avg, pctVal){
  let val=parseFloat(pctVal)
  let color = val>=0 ? "#22c55e" : "#ef4444"

  return `<div class="avg-box" style="background:rgba(255,255,255,0.05);border-left:3px solid ${color}">
    ${avg}<br>(${pctVal}%)
  </div>`
}

function createChart(id, data){
  if(!data) return

  new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels:data.map((_,i)=>i),
      datasets:[{
        data:data,
        borderWidth:1,
        tension:0.3,
        pointRadius:0
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{x:{display:false},y:{display:false}}
    }
  })
}

async function load(){

  const res = await fetch("./data.json?t="+Date.now())
  const data = await res.json()

  let invested=0, current=0

  data.forEach(d=>{
    let qty=safe(d.quantity,1)
    let buy=safe(d.buy_price,0)
    let price=safe(d.current,0)

    invested += buy*qty
    current += price*qty
  })

  let pnl=current-invested
  let ret = invested?((pnl/invested)*100).toFixed(2):0

  // KPIs
  document.getElementById("kpis").innerHTML=`
    <div class="card"><div>Total Value</div><div class="big">₹${current.toFixed(0)}</div></div>
    <div class="card"><div>Invested</div><div class="big">₹${invested.toFixed(0)}</div></div>
    <div class="card"><div>P&L</div><div class="big ${pnl>=0?'positive':'negative'}">₹${pnl.toFixed(0)}</div></div>
    <div class="card"><div>Return</div><div class="big ${ret>=0?'positive':'negative'}">${ret}%</div></div>
    <div class="card"><div>Stocks</div><div class="big">${data.length}</div></div>
  `

  // Allocation
  document.getElementById("allocation").innerHTML=
    data.map(d=>{
      let val=safe(d.current)*safe(d.quantity,1)
      let pctVal = current ? (val/current*100).toFixed(1) : 0
      return `<div>${d.ticker} (${pctVal}%)
        <div class="bar"><div class="bar-fill" style="width:${pctVal}%"></div></div>
      </div>`
    }).join("")

  // Gainers / losers
  let sorted=[...data].sort((a,b)=>safe(b.pnl)-safe(a.pnl))

  document.getElementById("gainers").innerHTML =
    sorted.slice(0,5).map(d=>`<tr><td>${d.ticker}</td><td class="positive">${d.pnl||0}%</td></tr>`).join("")

  document.getElementById("losers").innerHTML =
    sorted.slice(-5).map(d=>`<tr><td>${d.ticker}</td><td class="negative">${d.pnl||0}%</td></tr>`).join("")

  // Table
  document.getElementById("table").innerHTML =
    sorted.map((d,i)=>{

      let p7=pct(d.current,d.avg7)
      let p14=pct(d.current,d.avg14)
      let p30=pct(d.current,d.avg30)

      let reco = d.recommendation || "HOLD"

      return `<tr>
        <td>${d.ticker}</td>
        <td><canvas id="c${i}"></canvas></td>
        <td>${d.buy_price || '-'}</td>
        <td>${d.quantity || 1}</td>
        <td>${d.current}</td>

        <td>${avgBox(d.avg7,p7)}</td>
        <td>${avgBox(d.avg14,p14)}</td>
        <td>${avgBox(d.avg30,p30)}</td>

        <td>${d.rsi ?? '-'}</td>
        <td>${d.ai_score ?? 0}</td>

        <td class="${reco.includes('BUY')?'buy':reco.includes('SELL')?'sell':'hold'}">${reco}</td>

        <td style="text-align:left;font-size:10px;">
          ${(d.reasons||[]).map(r=>"• "+r).join("<br>")}
        </td>

        <td class="${d.pnl>=0?'positive':'negative'}">${d.pnl||0}%</td>
        <td>${d.heat?.toFixed(2) || 0}</td>
      </tr>`
    }).join("")

  setTimeout(()=>{
    sorted.forEach((d,i)=>{
      createChart(`c${i}`, d.history)
    })
  },200)
}

load()
setInterval(load,300000)

</script>

</body>
</html>
