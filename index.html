<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #334155;
      padding: 12px;
      text-align: center;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #475569;
    }

    tr:hover {
      background: #334155;
    }

    .green { color: #22c55e; font-weight: bold; }
    .red { color: #ef4444; font-weight: bold; }

    #lastUpdated {
      text-align: center;
      margin-top: 10px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<h2>📊 Trading Dashboard</h2>
<p id="lastUpdated"></p>

<table>
  <thead>
    <tr>
      <th>Ticker</th>
      <th>Current</th>
      <th>7D Avg</th>
      <th>14D Avg</th>
      <th>30D Avg</th>
      <th>Signals</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
async function loadData() {
  const res = await fetch("./data.json");
  const data = await res.json();

  const table = document.getElementById("table");
  table.innerHTML = "";

  data.forEach(d => {
    let signalText = d.signals.join(", ");

    let className =
      signalText.includes("🔺") ? "green" :
      signalText.includes("🔻") ? "red" : "";

    table.innerHTML += `
      <tr>
        <td>${d.ticker}</td>
        <td>${d.current}</td>
        <td>${d.avg7}</td>
        <td>${d.avg14}</td>
        <td>${d.avg30}</td>
        <td class="${className}">${signalText}</td>
      </tr>
    `;
  });

  document.getElementById("lastUpdated").innerText =
    "Last updated: " + new Date().toLocaleString();
}

loadData();
setInterval(loadData, 300000);
</script>

</body>
</html>
