<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #334155;
      padding: 12px;
      text-align: center;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #475569;
    }

    tr:hover {
      background: #334155;
    }

    .green { color: #22c55e; font-weight: bold; }
    .red { color: #ef4444; font-weight: bold; }

    #lastUpdated {
      text-align: center;
      margin-top: 10px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<h2>📊 Trading Dashboard</h2>
<p id="lastUpdated"></p>

<table>
  <thead>
	<tr>
	  <th>Ticker</th>
	  <th>Buy</th>
	  <th>Current</th>
	  <th>P&L</th>
	  <th>7D Avg</th>
	  <th>14D Avg</th>
	  <th>30D Avg</th>
	  <th>Heat</th>
	  <th>Signals</th>
	</tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
function getColor(diff) {
  const abs = Math.abs(diff);

  if (abs < 0.05) return "";

  if (diff > 0) {
    if (abs < 0.10) return "rgba(34,197,94,0.2)";
    if (abs < 0.20) return "rgba(34,197,94,0.4)";
    return "rgba(34,197,94,0.7)";
  } else {
    if (abs < 0.10) return "rgba(239,68,68,0.2)";
    if (abs < 0.20) return "rgba(239,68,68,0.4)";
    return "rgba(239,68,68,0.7)";
  }
}

function getBorder(diff) {
  if (Math.abs(diff) < 0.10) return "";
  return diff > 0 ? "4px solid #22c55e" : "4px solid #ef4444";
}

async function loadData() {
  const res = await fetch("./data.json?t=" + Date.now());
  const data = await res.json();

  const table = document.getElementById("table");
  table.innerHTML = "";

  // 🔥 Calculate derived fields first
  data.forEach(d => {
    d.diff7 = (d.current - d.avg7) / d.avg7;
    d.diff14 = (d.current - d.avg14) / d.avg14;
    d.diff30 = (d.current - d.avg30) / d.avg30;

    // Heat score = strength of deviation
    d.heat = Math.abs(d.diff7) + Math.abs(d.diff14);

    // Total gain/loss (assuming 1 unit for now)
    d.totalGain = d.current - d.buy_price;
  });

  // 🔥 Sort by heat score (highest first)
  data.sort((a, b) => b.heat - a.heat);

  data.forEach(d => {

    const pnlClass = d.pnl > 0 ? "green" : d.pnl < 0 ? "red" : "";

    function formatCell(avg, diff) {
      return `
        <td style="
          background:${getColor(diff)};
          border-left:${getBorder(diff)};
        ">
          ${avg}
          <br>
          <small>(${(diff*100).toFixed(1)}%)</small>
        </td>
      `;
    }

    table.innerHTML += `
      <tr>
        <td>${d.ticker}</td>
        <td>${d.buy_price}</td>
        <td>${d.current}</td>

        <td class="${pnlClass}">
          ${d.pnl}% 
          <br>
          <small>${d.totalGain.toFixed(2)}</small>
        </td>

        ${formatCell(d.avg7, d.diff7)}
        ${formatCell(d.avg14, d.diff14)}
        ${formatCell(d.avg30, d.diff30)}

        <td><b>${d.heat.toFixed(2)}</b></td>

        <td>${d.signals.join(", ")}</td>
      </tr>
    `;
  });

  document.getElementById("lastUpdated").innerText =
    "Last updated: " + new Date().toLocaleString();
}

loadData();
setInterval(loadData, 300000);
</script>

</body>
</html>
