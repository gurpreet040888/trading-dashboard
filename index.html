<!DOCTYPE html>
<html>
<head>
  <title>Smart Trading Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#020617; color:white; padding:20px; }
    h2,h3 { text-align:center; }

    .controls { display:flex; gap:10px; justify-content:center; margin-bottom:15px; }
    input,select { padding:6px; border-radius:6px; border:none; }

    .top-section { display:flex; gap:15px; margin-bottom:20px; }
    .card { flex:1; background:#0f172a; padding:10px; border-radius:10px; }

    table { width:100%; border-collapse:collapse; }

    thead th {
      position:sticky; top:0; background:#1e293b;
      z-index:10; padding:8px; font-size:11px;
    }

    td { padding:6px; text-align:center; border-bottom:1px solid #334155; font-size:11px; }

    .positive { color:#22c55e; }
    .negative { color:#ef4444; }
    .buy { color:#22c55e; }
    .sell { color:#ef4444; }
    .hold { color:#eab308; }

    .badge { font-size:9px; padding:2px 6px; border-radius:4px; margin-left:4px; }
    .us { background:#1e40af; }
    .in { background:#065f46; }

    canvas { width:120px!important; height:40px!important; }

    .avg-cell { padding:4px; border-radius:6px; }

    .portfolio-box { margin-top:30px; background:#0f172a; padding:15px; border-radius:10px; }
  </style>
</head>

<body>

<h2>📊 Smart Trading Dashboard</h2>

<div class="controls">
  <input id="search" placeholder="Search ticker...">
  <select id="marketFilter">
    <option value="ALL">All Markets</option>
    <option value="IN">India</option>
    <option value="US">US</option>
  </select>
  <select id="sortBy">
    <option value="opportunity">Sort: Opportunity</option>
    <option value="ai_score">Sort: AI Score</option>
    <option value="pnl">Sort: PnL</option>
    <option value="heat">Sort: Heat</option>
  </select>
</div>

<div class="top-section">
  <div class="card"><h3>🔥 Top 5</h3><table><tbody id="top5"></tbody></table></div>
  <div class="card"><h3>🟢 BUY</h3><table><tbody id="topBuy"></tbody></table></div>
  <div class="card"><h3>🔴 SELL</h3><table><tbody id="topSell"></tbody></table></div>
</div>

<div style="max-height:65vh; overflow:auto;">
<table>
<thead>
<tr>
<th>Ticker</th><th>Chart</th><th>Buy</th><th>Qty</th><th>Price</th>
<th>7D</th><th>14D</th><th>30D</th>
<th>RSI</th><th>Score</th><th>Reco</th>
<th>Reasons</th><th>PnL%</th><th>Heat</th>
</tr>
</thead>
<tbody id="mainTable"></tbody>
</table>
</div>

<div class="portfolio-box">
<h3>💼 Portfolio Summary</h3>
<div id="summary"></div>
</div>

<script>

const USD_INR = 83
let globalData = []

function isUS(t){ return !t.includes(".NS") }

function formatCurrency(v,t){
  if(v==null) return "-"
  return isUS(t) ? `$ ${v}` : `₹ ${v}`
}

function pct(c,a){ return ((c-a)/a*100).toFixed(1) }

function avgCell(avg,p,t){
  let bg = p>=0 ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)"
  return `<div class="avg-cell" style="background:${bg}">
    ${formatCurrency(avg,t)}<br><small>(${p}%)</small></div>`
}

function render(){

  let s = document.getElementById("search").value.toUpperCase()
  let f = document.getElementById("marketFilter").value
  let sort = document.getElementById("sortBy").value

  let data = globalData.filter(d =>
    d.ticker.includes(s) &&
    (f==="ALL" || (f==="US" && isUS(d.ticker)) || (f==="IN" && !isUS(d.ticker)))
  )

  data.forEach(d=>{
    d.opportunity = (d.ai_score||0)*2 + (d.heat||0)*10
  })

  data.sort((a,b)=>(b[sort]||0)-(a[sort]||0))

  // TOP SECTIONS
  let top5 = [...data].slice(0,5)
  let topBuy = data.filter(d=>d.recommendation?.includes("BUY")).slice(0,5)
  let topSell = data.filter(d=>d.recommendation?.includes("SELL")).slice(0,5)

  function mini(list){
    return list.map(d=>`
      <tr>
        <td>${d.ticker}</td>
        <td>${formatCurrency(d.current,d.ticker)}</td>
        <td class="${d.pnl>0?'positive':'negative'}">${d.pnl||0}%</td>
      </tr>`).join("")
  }

  document.getElementById("top5").innerHTML = mini(top5)
  document.getElementById("topBuy").innerHTML = mini(topBuy)
  document.getElementById("topSell").innerHTML = mini(topSell)

  // MAIN TABLE
  document.getElementById("mainTable").innerHTML =
    data.map((d,i)=>{

      let tag = isUS(d.ticker) ? `<span class="badge us">US</span>` : `<span class="badge in">IN</span>`

      return `<tr>
        <td>${d.ticker}${tag}</td>
        <td><canvas id="c${i}"></canvas></td>
        <td>${formatCurrency(d.buy_price,d.ticker)}</td>
        <td>${d.quantity||1}</td>
        <td>${formatCurrency(d.current,d.ticker)}</td>

        <td>${avgCell(d.avg7,pct(d.current,d.avg7),d.ticker)}</td>
        <td>${avgCell(d.avg14,pct(d.current,d.avg14),d.ticker)}</td>
        <td>${avgCell(d.avg30,pct(d.current,d.avg30),d.ticker)}</td>

        <td>${d.rsi||'-'}</td>
        <td>${d.ai_score||0}</td>

        <td class="${d.recommendation?.includes('BUY')?'buy':d.recommendation?.includes('SELL')?'sell':'hold'}">
          ${d.recommendation||'HOLD'}
        </td>

        <td style="text-align:left;font-size:10px">${(d.reasons||[]).join("<br>")}</td>

        <td class="${d.pnl>0?'positive':'negative'}">${d.pnl||0}%</td>
        <td>${d.heat?.toFixed(2)||0}</td>
      </tr>`
    }).join("")

  setTimeout(()=>{
    data.forEach((d,i)=>{
      if(d.history){
        new Chart(document.getElementById(`c${i}`),{
          type:'line',
          data:{labels:d.history.map((_,i)=>i),datasets:[{data:d.history,borderWidth:1,pointRadius:0}]},
          options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
        })
      }
    })
  },200)

  // SUMMARY (USD → INR)
  let invested=0, current=0

  data.forEach(d=>{
    let buy = d.buy_price||0
    let cur = d.current||0
    let qty = d.quantity||1

    if(isUS(d.ticker)){
      buy *= USD_INR
      cur *= USD_INR
    }

    invested += buy*qty
    current += cur*qty
  })

  let pnl = current - invested
  let pctRet = invested?((pnl/invested)*100).toFixed(2):0

  document.getElementById("summary").innerHTML = `
    Invested: ₹${invested.toFixed(0)} |
    Current: ₹${current.toFixed(0)} |
    P&L: <span class="${pnl>=0?'positive':'negative'}">₹${pnl.toFixed(0)}</span> |
    Return: <span class="${pctRet>=0?'positive':'negative'}">${pctRet}%</span>
  `
}

async function load(){
  const res = await fetch("./data.json?t="+Date.now())
  globalData = await res.json()
  render()
}

document.getElementById("search").oninput = render
document.getElementById("marketFilter").onchange = render
document.getElementById("sortBy").onchange = render

load()
setInterval(load,300000)

</script>

</body>
</html>
