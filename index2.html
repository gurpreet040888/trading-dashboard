<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard v2</title>

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      padding: 20px;
    }

    h2, h3 {
      text-align: center;
    }

    .top-section {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th {
      background: #1e293b;
      padding: 8px;
      font-size: 12px;
    }

    td {
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid #334155;
      font-size: 12px;
    }

    .buy { color: #22c55e; font-weight: bold; }
    .sell { color: #ef4444; font-weight: bold; }
    .hold { color: #eab308; }

    .positive { color: #22c55e; }
    .negative { color: #ef4444; }

  </style>
</head>

<body>

<h2>📊 Smart Trading Dashboard</h2>

<!-- ===================== -->
<!-- 🔝 TOP 3 SECTIONS -->
<!-- ===================== -->

<div class="top-section">

  <div class="card">
    <h3>🔥 Top 5 Opportunities</h3>
    <table>
      <tbody id="top5"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>🟢 Top BUY</h3>
    <table>
      <tbody id="topBuy"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>🔴 Top SELL</h3>
    <table>
      <tbody id="topSell"></tbody>
    </table>
  </div>

</div>

<!-- ===================== -->
<!-- 📊 MAIN TABLE -->
<!-- ===================== -->

<table>
  <thead>
    <tr>
      <th>Ticker</th>
      <th>Price</th>
      <th>7D</th>
      <th>14D</th>
      <th>30D</th>
      <th>%7D</th>
      <th>%14D</th>
      <th>%30D</th>
      <th>Signals</th>
      <th>RSI</th>
      <th>Score</th>
      <th>Reco</th>
      <th>Reasons</th>
      <th>PnL%</th>
      <th>Heat</th>
    </tr>
  </thead>
  <tbody id="mainTable"></tbody>
</table>

<script>

function pct(curr, avg) {
  return ((curr - avg) / avg * 100).toFixed(1);
}

async function loadData() {

  const res = await fetch("./data.json?t=" + Date.now());
  const data = await res.json();

  // 🔥 Sort by opportunity (AI + Heat)
  data.forEach(d => {
    d.opportunity = (d.ai_score || 0) * 2 + (d.heat || 0) * 10;
  });

  const sorted = [...data].sort((a,b)=>b.opportunity - a.opportunity);

  const buys = data.filter(d => d.ai_score >= 1)
                   .sort((a,b)=>b.ai_score - a.ai_score);

  const sells = data.filter(d => d.ai_score <= -1)
                    .sort((a,b)=>a.ai_score - b.ai_score);

  // =====================
  // 🔝 TOP 5
  // =====================
  document.getElementById("top5").innerHTML =
    sorted.slice(0,5).map(d => `
      <tr>
        <td>${d.ticker}</td>
        <td>${d.current}</td>
        <td class="${d.ai_score > 0 ? 'buy' : 'sell'}">${d.ai_score}</td>
      </tr>
    `).join("");

  // =====================
  // 🟢 BUY
  // =====================
  document.getElementById("topBuy").innerHTML =
    buys.slice(0,5).map(d => `
      <tr>
        <td>${d.ticker}</td>
        <td class="buy">${d.ai_score}</td>
        <td>${d.rsi}</td>
      </tr>
    `).join("");

  // =====================
  // 🔴 SELL
  // =====================
  document.getElementById("topSell").innerHTML =
    sells.slice(0,5).map(d => `
      <tr>
        <td>${d.ticker}</td>
        <td class="sell">${d.ai_score}</td>
        <td>${d.rsi}</td>
      </tr>
    `).join("");

  // =====================
  // 📊 MAIN TABLE
  // =====================
  document.getElementById("mainTable").innerHTML =
    sorted.map(d => {

      const p7 = pct(d.current, d.avg7);
      const p14 = pct(d.current, d.avg14);
      const p30 = pct(d.current, d.avg30);

      return `
      <tr>
        <td>${d.ticker}</td>
        <td>${d.current}</td>
        <td>${d.avg7}</td>
        <td>${d.avg14}</td>
        <td>${d.avg30}</td>
        <td class="${p7 > 0 ? 'positive':'negative'}">${p7}%</td>
        <td class="${p14 > 0 ? 'positive':'negative'}">${p14}%</td>
        <td class="${p30 > 0 ? 'positive':'negative'}">${p30}%</td>
        <td>${d.signals.join(", ")}</td>
        <td>${d.rsi}</td>
        <td>${d.ai_score}</td>
        <td class="${d.recommendation.includes('BUY') ? 'buy' : d.recommendation.includes('SELL') ? 'sell' : 'hold'}">
          ${d.recommendation}
        </td>
        <td>${d.reasons.join(", ")}</td>
        <td class="${d.pnl > 0 ? 'positive':'negative'}">${d.pnl}%</td>
        <td>${d.heat?.toFixed(2)}</td>
      </tr>
      `;
    }).join("");
}

loadData();
setInterval(loadData, 300000);

</script>

</body>
</html>
