<!DOCTYPE html>
<html>
<head>
  <title>Trading Dashboard v2</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      padding: 20px;
    }

    h2, h3 {
      text-align: center;
    }

    .top-section {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th {
      background: #1e293b;
      padding: 8px;
      font-size: 11px;
    }

    td {
      padding: 6px;
      text-align: center;
      border-bottom: 1px solid #334155;
      font-size: 11px;
    }

    canvas {
      width: 120px !important;
      height: 40px !important;
    }

    .buy { color: #22c55e; font-weight: bold; }
    .sell { color: #ef4444; font-weight: bold; }
    .hold { color: #eab308; }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }

    /* 🔥 Avg cell styling */
    .avg-cell {
      padding: 5px;
      border-radius: 6px;
      line-height: 1.2;
    }

    .avg-value {
      font-weight: bold;
    }

    .avg-pct {
      font-size: 10px;
      opacity: 0.9;
    }

  </style>
</head>

<body>

<h2>📊 Smart Trading Dashboard</h2>

<div class="top-section">

  <div class="card">
    <h3>🔥 Top 5 Opportunities</h3>
    <table><tbody id="top5"></tbody></table>
  </div>

  <div class="card">
    <h3>🟢 Top BUY</h3>
    <table><tbody id="topBuy"></tbody></table>
  </div>

  <div class="card">
    <h3>🔴 Top SELL</h3>
    <table><tbody id="topSell"></tbody></table>
  </div>

</div>

<table>
  <thead>
    <tr>
      <th>Ticker</th>
      <th>Chart</th>
      <th>Buy</th>
      <th>Qty</th>
      <th>Price</th>
      <th>7D</th>
      <th>14D</th>
      <th>30D</th>
      <th>RSI</th>
      <th>Score</th>
      <th>Reco</th>
      <th>Reasons</th>
      <th>PnL%</th>
      <th>Heat</th>
    </tr>
  </thead>
  <tbody id="mainTable"></tbody>
</table>

<script>

function pct(curr, avg) {
  return ((curr - avg) / avg * 100).toFixed(1);
}

/* 🔥 Gradient avg cell */
function formatAvgCell(avg, pctVal) {
  const val = parseFloat(pctVal);
  const intensity = Math.min(Math.abs(val) / 10, 1);

  let bg = "rgba(148,163,184,0.1)";
  let border = "#64748b";

  if (val > 0) {
    bg = `rgba(34,197,94,${0.15 + intensity * 0.4})`;
    border = "#22c55e";
  } else if (val < 0) {
    bg = `rgba(239,68,68,${0.15 + intensity * 0.4})`;
    border = "#ef4444";
  }

  return `
    <div class="avg-cell" style="background:${bg}; border-left:3px solid ${border}">
      <div class="avg-value">${avg}</div>
      <div class="avg-pct">(${pctVal}%)</div>
    </div>
  `;
}

function createChart(id, data) {
  const ctx = document.getElementById(id);

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map((_, i) => i),
      datasets: [{
        data: data,
        borderWidth: 1,
        tension: 0.3,
        pointRadius: 0
      }]
    },
    options: {
      plugins: { legend: { display: false }},
      scales: {
        x: { display: false },
        y: { display: false }
      }
    }
  });
}

async function loadData() {

  const res = await fetch("./data.json?t=" + Date.now());
  const data = await res.json();

  data.forEach(d => {
    d.opportunity = (d.ai_score || 0) * 2 + (d.heat || 0) * 10;
  });

  const sorted = [...data].sort((a,b)=>b.opportunity - a.opportunity);

  const buys = data.filter(d => d.ai_score >= 1).sort((a,b)=>b.ai_score-a.ai_score);
  const sells = data.filter(d => d.ai_score <= -1).sort((a,b)=>a.ai_score-b.ai_score);

  document.getElementById("top5").innerHTML =
    sorted.slice(0,5).map(d => `
      <tr><td>${d.ticker}</td><td>${d.current}</td><td>${d.ai_score}</td></tr>
    `).join("");

  document.getElementById("topBuy").innerHTML =
    buys.slice(0,5).map(d => `
      <tr><td>${d.ticker}</td><td class="buy">${d.ai_score}</td></tr>
    `).join("");

  document.getElementById("topSell").innerHTML =
    sells.slice(0,5).map(d => `
      <tr><td>${d.ticker}</td><td class="sell">${d.ai_score}</td></tr>
    `).join("");

  document.getElementById("mainTable").innerHTML =
    sorted.map((d, i) => {

      const p7 = pct(d.current, d.avg7);
      const p14 = pct(d.current, d.avg14);
      const p30 = pct(d.current, d.avg30);

      return `
      <tr>
        <td>${d.ticker}</td>
        <td><canvas id="chart-${i}"></canvas></td>
        <td>${d.buy_price || '-'}</td>
        <td>${d.quantity || 1}</td>
        <td>${d.current}</td>

        <td>${formatAvgCell(d.avg7, p7)}</td>
        <td>${formatAvgCell(d.avg14, p14)}</td>
        <td>${formatAvgCell(d.avg30, p30)}</td>

        <td>${d.rsi}</td>
        <td>${d.ai_score}</td>

        <td class="${d.recommendation.includes('BUY') ? 'buy' : d.recommendation.includes('SELL') ? 'sell' : 'hold'}">
          ${d.recommendation}
        </td>

        <td style="font-size:10px; text-align:left;">
          ${d.reasons?.map(r => `<div>• ${r}</div>`).join("") || "—"}
        </td>

        <td class="${d.pnl > 0 ? 'positive':'negative'}">${d.pnl}%</td>
        <td>${d.heat?.toFixed(2)}</td>
      </tr>
      `;
    }).join("");

  setTimeout(() => {
    sorted.forEach((d, i) => {
      if (d.history) {
        createChart(`chart-${i}`, d.history);
      }
    });
  }, 200);
}

loadData();
setInterval(loadData, 300000);

</script>

</body>
</html>
