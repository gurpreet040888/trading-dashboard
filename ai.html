<!DOCTYPE html>
<html>
<head>
  <title>AI Trading Insights</title>

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #0f172a;
    }

    th {
      background: #1e293b;
      padding: 10px;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    .buy { color: #22c55e; font-weight: bold; }
    .sell { color: #ef4444; font-weight: bold; }
    .hold { color: #eab308; }

  </style>
</head>

<body>

<h2>🧠 AI Trading Insights</h2>

<h3>🟢 Top BUY Opportunities</h3>
<table>
  <thead>
    <tr>
      <th>Ticker</th>
      <th>Score</th>
      <th>RSI</th>
      <th>Reasons</th>
    </tr>
  </thead>
  <tbody id="buyTable"></tbody>
</table>

<h3>🔴 Top SELL Opportunities</h3>
<table>
  <thead>
    <tr>
      <th>Ticker</th>
      <th>Score</th>
      <th>RSI</th>
      <th>Reasons</th>
    </tr>
  </thead>
  <tbody id="sellTable"></tbody>
</table>

<h3>📊 All Stocks</h3>
<table>
  <thead>
    <tr>
      <th>Ticker</th>
      <th>Price</th>
      <th>RSI</th>
      <th>Score</th>
      <th>Recommendation</th>
      <th>Reasons</th>
    </tr>
  </thead>
  <tbody id="allTable"></tbody>
</table>

<script>

async function loadData() {
  const res = await fetch("./data.json?t=" + Date.now());
  const data = await res.json();

  const buy = data.filter(d => d.ai_score >= 1).sort((a,b)=>b.ai_score-a.ai_score);
  const sell = data.filter(d => d.ai_score <= -1).sort((a,b)=>a.ai_score-b.ai_score);

  document.getElementById("buyTable").innerHTML =
    buy.slice(0,5).map(d => `
      <tr>
        <td>${d.ticker}</td>
        <td class="buy">${d.ai_score}</td>
        <td>${d.rsi}</td>
        <td>${d.reasons.join(", ")}</td>
      </tr>
    `).join("");

  document.getElementById("sellTable").innerHTML =
    sell.slice(0,5).map(d => `
      <tr>
        <td>${d.ticker}</td>
        <td class="sell">${d.ai_score}</td>
        <td>${d.rsi}</td>
        <td>${d.reasons.join(", ")}</td>
      </tr>
    `).join("");

  document.getElementById("allTable").innerHTML =
    data.map(d => `
      <tr>
        <td>${d.ticker}</td>
        <td>${d.current}</td>
        <td>${d.rsi}</td>
        <td>${d.ai_score}</td>
        <td class="${d.recommendation.includes('BUY') ? 'buy' : d.recommendation.includes('SELL') ? 'sell' : 'hold'}">
          ${d.recommendation}
        </td>
        <td>${d.reasons.join(", ")}</td>
      </tr>
    `).join("");
}

loadData();
setInterval(loadData, 300000);

</script>

</body>
</html>
