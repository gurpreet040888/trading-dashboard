name: Update Stock Data

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install yfinance

      - name: Generate JSON
        run: |
          python - <<EOF
          import json
          from backend.fetch_data import analyze_stock

          stocks = ["AAPL","MSFT","RELIANCE.NS","TCS.NS","^NSEI"]
          results = []

          for s in stocks:
              r = analyze_stock(s)
              if r:
                  results.append(r)

          with open("frontend/data.json", "w") as f:
              json.dump(results, f)
          EOF

      - name: Commit file
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add frontend/data.json
          git commit -m "update data" || exit 0
          git push