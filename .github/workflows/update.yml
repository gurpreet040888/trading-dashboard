name: Update Stock Data

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # allows manual run

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install yfinance

      - name: Generate stock data
        run: |
          python - <<EOF
          import json, csv
          from backend.fetch_data import analyze_stock
  
          results = []
  
          with open("stocks.csv") as f:
              reader = csv.DictReader(f)
  
              for row in reader:
                  try:
                      ticker = row["ticker"].strip()
                      buy_price = float(row["buy_price"])
                      qty = float(row["quantity"])
  
                      data = analyze_stock(ticker, buy_price)
  
                      if not data:
                          continue
  
                      # 🔥 Add quantity-based calculations
                      invested = buy_price * qty
                      current_value = data["current"] * qty
                      total_gain = current_value - invested
  
                      # Heat score (same logic as frontend)
                      diff7 = (data["current"] - data["avg7"]) / data["avg7"]
                      diff14 = (data["current"] - data["avg14"]) / data["avg14"]
  
                      heat = abs(diff7) + abs(diff14)
  
                      data.update({
                          "quantity": qty,
                          "invested": round(invested, 2),
                          "current_value": round(current_value, 2),
                          "total_gain": round(total_gain, 2),
                          "heat": round(heat, 4)
                      })
  
                      results.append(data)
  
                  except Exception as e:
                      print("Error:", row, e)
  
          with open("data.json", "w") as f:
              json.dump(results, f)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Auto update stock data" || exit 0
          git pull --rebase origin main || true
          git push origin HEAD:main